version: "3.9"

services:
  rag-api:
    build: .
    container_name: rag-knowledge-base-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - rag_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rag_data:
